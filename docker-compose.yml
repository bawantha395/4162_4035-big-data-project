version: '3.8'

# ══════════════════════════════════════════════════════════════
#  FinTech Fraud Detection Pipeline — Docker Compose
#  Services: Zookeeper · Kafka (3 brokers) · Schema Registry
#            Kafka UI · Spark · PostgreSQL · Airflow
# ══════════════════════════════════════════════════════════════

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0
  env_file: .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_pass@airflow_db:5432/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY=
    AIRFLOW__WEBSERVER__SECRET_KEY: fraud_webserver_secret
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./spark:/opt/airflow/spark
    - ./reports:/opt/airflow/data/reports
    - airflow_logs:/opt/airflow/logs
    - validated_data:/opt/airflow/data/validated
  depends_on:
    airflow_db:
      condition: service_healthy
  networks:
    - kafka_network
    - default

services:

  # ── PostgreSQL: Fraud Sink + Airflow Metadata ──────────────
  fraud_postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - fraud_pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka_network
      - default

  airflow_db:
    image: postgres:15-alpine
    container_name: airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow_pass
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kafka_network
      - default

  # ── Zookeeper ─────────────────────────────────────────────
  kafka_zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: kafka_zookeeper
    env_file: .env
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_SERVER_ID: ${ZOOKEEPER_SERVER_ID}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka_network

  # ── Kafka Broker 1 ────────────────────────────────────────
  kafka_broker_1:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_broker_1
    env_file: .env
    depends_on:
      - kafka_zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: kafka_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka_broker_1:19092,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092,DOCKER://host.docker.internal:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_LOG4J_LOGGERS: ${KAFKA_LOG4J_LOGGERS}
      KAFKA_AUTHORIZER_CLASS_NAME: ${KAFKA_AUTHORIZER_CLASS_NAME}
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: ${KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - kafka_network

  # ── Kafka Broker 2 ────────────────────────────────────────
  kafka_broker_2:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_broker_2
    env_file: .env
    depends_on:
      - kafka_zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: kafka_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka_broker_2:19093,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9093,DOCKER://host.docker.internal:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_LOG4J_LOGGERS: ${KAFKA_LOG4J_LOGGERS}
      KAFKA_AUTHORIZER_CLASS_NAME: ${KAFKA_AUTHORIZER_CLASS_NAME}
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: ${KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - kafka_network

  # ── Kafka Broker 3 ────────────────────────────────────────
  kafka_broker_3:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_broker_3
    env_file: .env
    depends_on:
      - kafka_zookeeper
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: kafka_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka_broker_3:19094,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9094,DOCKER://host.docker.internal:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_LOG4J_LOGGERS: ${KAFKA_LOG4J_LOGGERS}
      KAFKA_AUTHORIZER_CLASS_NAME: ${KAFKA_AUTHORIZER_CLASS_NAME}
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: ${KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - kafka_network

  # ── Schema Registry ───────────────────────────────────────
  kafka_schema_registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: kafka_schema_registry
    env_file: .env
    depends_on:
      - kafka_broker_1
      - kafka_broker_2
      - kafka_broker_3
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: ${SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS}
      SCHEMA_REGISTRY_HOST_NAME: ${SCHEMA_REGISTRY_HOST_NAME}
      SCHEMA_REGISTRY_LISTENERS: ${SCHEMA_REGISTRY_LISTENERS}
    networks:
      - kafka_network

  # ── Kafka UI ──────────────────────────────────────────────
  kafka_ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka_ui
    env_file: .env
    depends_on:
      - kafka_broker_1
      - kafka_broker_2
      - kafka_broker_3
    ports:
      - "8888:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTERS_0_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS}
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: ${KAFKA_CLUSTERS_0_SCHEMAREGISTRY}
      DYNAMIC_CONFIG_ENABLED: ${DYNAMIC_CONFIG_ENABLED}
    networks:
      - kafka_network

  # ── Apache Spark Master ───────────────────────────────────
  spark_master:
    image: apache/spark:3.5.1-python3
    container_name: spark_master
    env_file: .env
    environment:
      SPARK_MODE: master
      SPARK_UI_PORT: ${SPARK_UI_PORT}
      SPARK_RPC_AUTHENTICATION_ENABLED: ${SPARK_RPC_AUTHENTICATION_ENABLED}
      SPARK_RPC_ENCRYPTION_ENABLED: ${SPARK_RPC_ENCRYPTION_ENABLED}
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - spark_data:/opt/bitnami/spark/data
      - ./spark:/opt/bitnami/spark/jobs
    networks:
      - kafka_network
      - default

  # ── Airflow Init ──────────────────────────────────────────
  airflow_init:
    <<: *airflow-common
    container_name: airflow_init
    command: >
      bash -c "
        pip install psycopg2-binary confluent-kafka pandas pyarrow &&
        airflow db init &&
        airflow users create
          --role Admin
          --username admin
          --email admin@fraud.com
          --firstname Fraud
          --lastname Admin
          --password admin
      "
    restart: "no"

  # ── Airflow Webserver ─────────────────────────────────────
  airflow_webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8085:8080"
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Airflow Scheduler ─────────────────────────────────────
  airflow_scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    restart: unless-stopped

# ══════════════════════════════════════════════════════════════
#  Volumes & Networks
# ══════════════════════════════════════════════════════════════
volumes:
  fraud_pg_data:
  airflow_pg_data:
  airflow_logs:
  validated_data:
  spark_data:

networks:
  kafka_network:
    driver: bridge
  default:
    name: docker_fraud
    driver: bridge
