# ══════════════════════════════════════════════════════════════
#  FinTech Fraud Detection Pipeline — Docker Compose
#  Based on proven previous-project format
#  Services: Zookeeper · Kafka (3 brokers) · Schema Registry
#            Kafka Connect · Kafka UI · Spark · PostgreSQL · Airflow
# ══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL: Fraud Sink ─────────────────────────────────
  fraud_postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - fraud_pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    logging:
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - kafka_network
      - default

  # ── Airflow PostgreSQL Metadata DB ────────────────────────
  airflow_db:
    image: postgres:15-alpine
    container_name: airflow_db
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow_pass
      - POSTGRES_DB=airflow
    logging:
      options:
        max-size: 10m
        max-file: "3"

  # ── Apache Airflow Webserver + Scheduler ──────────────────
  airflow_webserver:
    image: apache/airflow:2.8.0
    container_name: airflow_webserver
    restart: always
    depends_on:
      - airflow_db
      - fraud_postgres
    environment:
      - LOAD_EX=n
      - EXECUTOR=Local
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_pass@airflow_db:5432/airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_pass@airflow_db:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY=
      - AIRFLOW__WEBSERVER__SECRET_KEY=fraud_webserver_secret
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - VALIDATED_DATA_PATH=/opt/airflow/data/validated
      - REPORTS_PATH=/opt/airflow/data/reports
    command: bash -c "
        until pg_isready -h airflow_db -p 5432 -U airflow; do sleep 2; done &&
        airflow db migrate &&
        airflow users create --role Admin --username admin --email admin@fraud.com --firstname Fraud --lastname Admin --password admin ;
        airflow webserver"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark:/opt/airflow/spark
      - ./reports:/opt/airflow/data/reports
      - airflow_logs:/opt/airflow/logs
      - validated_data:/opt/airflow/data/validated
    ports:
      - "8082:8080"
    logging:
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/local/airflow/airflow-webserver.pid ]"]
      interval: 30s
      timeout: 30s
      retries: 3
    networks:
      - kafka_network
      - default

  # ── Apache Airflow Scheduler ──────────────────────────────
  airflow_scheduler:
    image: apache/airflow:2.8.0
    container_name: airflow_scheduler
    restart: always
    depends_on:
      - airflow_webserver
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow_pass@airflow_db:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY=
      - AIRFLOW__WEBSERVER__SECRET_KEY=fraud_webserver_secret
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - VALIDATED_DATA_PATH=/opt/airflow/data/validated
      - REPORTS_PATH=/opt/airflow/data/reports
    command: bash -c "
        until pg_isready -h airflow_db -p 5432 -U airflow; do sleep 2; done &&
        airflow scheduler"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./spark:/opt/airflow/spark
      - ./reports:/opt/airflow/data/reports
      - airflow_logs:/opt/airflow/logs
      - validated_data:/opt/airflow/data/validated
    logging:
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - kafka_network
      - default

  # ── Zookeeper ─────────────────────────────────────────────
  kafka_zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: kafka_zookeeper
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=${ZOOKEEPER_CLIENT_PORT}
      - ZOOKEEPER_SERVER_ID=${ZOOKEEPER_SERVER_ID}
      - ZOOKEEPER_SERVERS=kafka_zookeeper:2888:3888
    networks:
      - kafka_network
      - default

  # ── Kafka Base (extended by brokers) ──────────────────────
  kafka_base:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - kafka_zookeeper
    environment:
      - KAFKA_ZOOKEEPER_CONNECT=kafka_zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      - KAFKA_INTER_BROKER_LISTENER_NAME=${KAFKA_INTER_BROKER_LISTENER_NAME}
      - KAFKA_LOG4J_LOGGERS=${KAFKA_LOG4J_LOGGERS}
      - KAFKA_AUTHORIZER_CLASS_NAME=${KAFKA_AUTHORIZER_CLASS_NAME}
      - KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND=${KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND}
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_DEFAULT_REPLICATION_FACTOR=3
      - KAFKA_NUM_PARTITIONS=3
    networks:
      - kafka_network
      - default

  # ── Kafka Broker 1 ────────────────────────────────────────
  kafka_broker_1:
    extends:
      service: kafka_base
    container_name: kafka_broker_1
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka_broker_1:19092,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9092,DOCKER://host.docker.internal:29092

  # ── Kafka Broker 2 ────────────────────────────────────────
  kafka_broker_2:
    extends:
      service: kafka_base
    container_name: kafka_broker_2
    ports:
      - "9093:9093"
    environment:
      - KAFKA_BROKER_ID=2
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka_broker_2:19093,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9093,DOCKER://host.docker.internal:29093

  # ── Kafka Broker 3 ────────────────────────────────────────
  kafka_broker_3:
    extends:
      service: kafka_base
    container_name: kafka_broker_3
    ports:
      - "9094:9094"
    environment:
      - KAFKA_BROKER_ID=3
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka_broker_3:19094,EXTERNAL://${DOCKER_HOST_IP:-127.0.0.1}:9094,DOCKER://host.docker.internal:29094

  # ── Kafka Connect ─────────────────────────────────────────
  kafka_connect:
    image: confluentinc/cp-kafka-connect:7.4.0
    container_name: kafka_connect
    ports:
      - "8083:8083"
    depends_on:
      - kafka_broker_1
      - kafka_broker_2
      - kafka_broker_3
    environment:
      - CONNECT_BOOTSTRAP_SERVERS=kafka_broker_1:19092,kafka_broker_2:19093,kafka_broker_3:19094
      - CONNECT_REST_PORT=8083
      - CONNECT_GROUP_ID=fraud-connect-group
      - CONNECT_CONFIG_STORAGE_TOPIC=fraud-connect-configs
      - CONNECT_OFFSET_STORAGE_TOPIC=fraud-connect-offsets
      - CONNECT_STATUS_STORAGE_TOPIC=fraud-connect-status
      - CONNECT_KEY_CONVERTER=org.apache.kafka.connect.storage.StringConverter
      - CONNECT_VALUE_CONVERTER=org.apache.kafka.connect.storage.StringConverter
      - CONNECT_INTERNAL_KEY_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_INTERNAL_VALUE_CONVERTER=org.apache.kafka.connect.json.JsonConverter
      - CONNECT_REST_ADVERTISED_HOST_NAME=kafka_connect
      - CONNECT_LOG4J_ROOT_LOGLEVEL=INFO
      - CONNECT_PLUGIN_PATH=/usr/share/java,/usr/share/confluent-hub-components
    networks:
      - kafka_network
      - default

  # ── Kafka Schema Registry ─────────────────────────────────
  kafka_schema_registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: kafka_schema_registry
    ports:
      - "8081:8081"
    depends_on:
      - kafka_broker_1
      - kafka_broker_2
      - kafka_broker_3
    environment:
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=${SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS}
      - SCHEMA_REGISTRY_HOST_NAME=${SCHEMA_REGISTRY_HOST_NAME}
      - SCHEMA_REGISTRY_LISTENERS=${SCHEMA_REGISTRY_LISTENERS}
    networks:
      - kafka_network
      - default

  # ── Kafka UI ──────────────────────────────────────────────
  kafka_ui:
    container_name: kafka_ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8888:8080"
    depends_on:
      - kafka_broker_1
      - kafka_broker_2
      - kafka_broker_3
      - kafka_schema_registry
      - kafka_connect
    environment:
      - KAFKA_CLUSTERS_0_NAME=${KAFKA_CLUSTERS_0_NAME}
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=${KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS}
      - KAFKA_CLUSTERS_0_SCHEMAREGISTRY=${KAFKA_CLUSTERS_0_SCHEMAREGISTRY}
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME=connect
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS=http://kafka_connect:8083
      - DYNAMIC_CONFIG_ENABLED=${DYNAMIC_CONFIG_ENABLED}
    networks:
      - kafka_network
      - default

  # ── Apache Spark Master ───────────────────────────────────
  spark_master:
    image: apache/spark:3.5.1-python3
    container_name: spark_master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "9090:8080"
      - "7077:7077"
    environment:
      - SPARK_NO_DAEMONIZE=true
    volumes:
      - ./spark:/opt/spark/jobs
      - spark_data:/opt/spark/data
    networks:
      - kafka_network
      - default

# ══════════════════════════════════════════════════════════════
#  Volumes & Networks
# ══════════════════════════════════════════════════════════════
volumes:
  fraud_pg_data:
  airflow_logs:
  validated_data:
  spark_data:

networks:
  kafka_network:
    driver: bridge
  default:
    name: docker_fraud